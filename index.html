<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS4 THM KZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-top: #1a2942; 
            --bg-bottom: #0b111c;
            --text-main: #f0f6fc;
            --text-muted: #8b9db5; 
            --blue-light: #58a6ff;
            --blue-dark: #0056b3;
            --border-color: rgba(255,255,255,0.05);
            --bg-card: rgba(20, 26, 41, 0.7);
        }

        * { box-sizing: border-box; }

        body {
            background: radial-gradient(ellipse at top center, var(--bg-top) 0%, var(--bg-bottom) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px 10px 20px;
            position: relative;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            position: relative;
        }

        .main-logo { 
            width: 100%; 
            max-width: 450px; 
            display: block;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); 
            cursor: pointer;
        }

        .subtitle {
            margin-top: -12px;
            margin-right: 18px;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        
        .by-text {
            color: #7a8c9e;
            font-weight: 400;
        }

        .kizeo-text {
            color: #4a88c7;
            font-weight: 500;
        }

        .social-container {
            position: absolute;
            right: 40px;
            top: 40px;
            display: flex;
            gap: 15px;
        }

        .social-icon {
            width: 32px;
            height: 32px;
            transition: transform 0.3s ease;
        }
        .social-icon:hover {
            transform: scale(1.1);
        }

        .toolbar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 30px auto 40px auto;
            width: 100%;
            padding: 0 20px;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            z-index: 10;
        }

        .search-box {
            width: 100%;
            padding: 14px 45px 14px 25px;
            border-radius: 30px;
            background-color: #172236;
            border: 1px solid transparent;
            border-top: 1px solid rgba(255, 255, 255, 0.25);
            border-bottom: 1px solid rgba(0, 0, 0, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(0, 0, 0, 0.4);
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.25);
            color: #d1d9e6;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            background-color: #1a2840;
            border-top: 1px solid rgba(88, 166, 255, 0.5);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3), 0 0 15px rgba(88, 166, 255, 0.15); 
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px; height: 22px;
            fill: none;
            stroke: #8b9db5;
            stroke-width: 2.5;
            pointer-events: none;
        }

        .filters-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            z-index: 5;
            flex-wrap: wrap;
        }

        .custom-select {
            background: rgba(20, 29, 46, 0.6);
            color: #8b9db5;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .random-button {
            background: transparent;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .dado-icon { width: 32px; height: 32px; }

        @keyframes dice-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinning { animation: dice-spin 0.5s ease-out; }

        main {
            padding: 0 40px 40px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .card:hover { 
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), inset 0 0 0 1px var(--blue-light); 
            transform: translateY(-5px); 
        }

        .img-wrapper {
            position: relative; width: 100%; aspect-ratio: 16/9;
            border-radius: 10px; overflow: hidden; background: #000;
        }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }

        .tag { background: rgba(0,0,0,0.75); padding: 3px 8px; border-radius: 4px; font-size: 11px; }

        .card-title {
            margin: 15px 0; font-size: 15px; font-weight: 400; text-align: center;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .btn-group { display: flex; gap: 10px; }
        .btn {
            flex: 1; padding: 10px 0; border-radius: 20px; border: none;
            font-family: inherit; font-weight: 500; font-size: 13px; cursor: pointer; transition: 0.2s;
            text-decoration: none; display: flex; align-items: center; justify-content: center;
        }
        .btn-preview { background: rgba(88, 166, 255, 0.15); color: var(--blue-light); border: 1px solid rgba(88, 166, 255, 0.3); }
        .btn-download { background: var(--blue-dark); color: white; }

        .pagination { display: flex; justify-content: center; gap: 8px; margin: 40px 0; }
        .page-btn {
            background: rgba(20, 26, 41, 0.8); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted);
            width: 38px; height: 38px; border-radius: 8px; cursor: pointer;
        }
        .page-btn.active { background: var(--blue-light); color: white; }

        #preview-modal {
            visibility: hidden; opacity: 0; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 1000; display: flex; justify-content: center; align-items: center;
            transition: 0.3s;
        }
        #preview-modal.show { visibility: visible; opacity: 1; }
        #preview-modal img { max-width: 90%; max-height: 85%; border-radius: 8px; border: 2px solid var(--blue-light); }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }

        footer { text-align: center; color: var(--text-muted); font-size: 12px; padding: 20px 0; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/kizeo0/PS4-THM-KZ/refs/heads/main/recursos/titulo.png" alt="PS4 Themes" class="main-logo">
        <div class="subtitle">
            <span class="by-text">by</span> <span class="kizeo-text">KiZeo</span>
        </div>
    </div>
   <div class="social-container">
        <a href="https://www.youtube.com/@kizeo0/videos" target="_blank"><img src="recursos/yt.png" alt="YT" class="social-icon"></a>
        <a href="https://github.com/kizeo0" target="_blank"><img src="recursos/git.png" alt="Git" class="social-icon"></a>
        <a href="https://x.com/KiZeo0" target="_blank"><img src="recursos/x.png" alt="X" class="social-icon"></a>
    </div>
</header>

<div class="toolbar">
    <div class="search-wrapper">
        <input type="text" id="search" class="search-box" placeholder="Buscar temas...">
    </div>
    <div class="filters-container">
        <select class="custom-select" id="sort-select">
            <option value="AZ">A-Z</option>
            <option value="ZA">Z-A</option>
            <option value="RANDOM">Aleatorio</option>
        </select>
        <select class="custom-select" id="cat-select">
            <option value="ALL">Todas las Categorías</option>
            <option value="DYN">Dinámicos</option>
            <option value="STA">Estáticos</option>
        </select>
        <button id="random-btn" class="random-button">
            <img src="recursos/dado.png" alt="Aleatorio" class="dado-icon">
        </button>
    </div>
</div>

<main id="gallery"></main>
<div id="no-results" style="display:none; text-align:center;"><h2>No se encontraron temas</h2></div>
<div class="pagination" id="pagination"></div>

<footer>Creado por KiZeo - Para la Comunidad</footer>

<div id="preview-modal">
    <span class="close-modal" onclick="closePreview()">&times;</span>
    <img id="modal-img" src="" alt="Vista Previa">
</div>

<script>
    let allThemes = [];
    let filteredThemes = [];
    let currentPage = 1;
    const itemsPerPage = 12;
    let searchText = '';
    let currentCategory = 'ALL';
    let currentSort = 'AZ';

    const gallery = document.getElementById('gallery');
    const searchInput = document.getElementById('search');
    const sortSelect = document.getElementById('sort-select');
    const catSelect = document.getElementById('cat-select');
    const randomBtn = document.getElementById('random-btn');
    const paginationContainer = document.getElementById('pagination');
    const modal = document.getElementById('preview-modal');
    const modalImg = document.getElementById('modal-img');
    const noResults = document.getElementById('no-results');

    function fixPath(name) {
        return encodeURIComponent(name).replace(/'/g, "%27").replace(/\(/g, "%28").replace(/\)/g, "%29");
    }

    function isDynamic(theme) {
        return theme.nombre.toLowerCase().includes('dynamic');
    }

    function applyFilters() {
        let temp = allThemes.filter(theme => {
            if (currentCategory === 'DYN') return isDynamic(theme);
            if (currentCategory === 'STA') return !isDynamic(theme);
            return true;
        });

        if (searchText) temp = temp.filter(t => t.nombre.toLowerCase().includes(searchText));

        if (currentSort === 'AZ') temp.sort((a, b) => a.nombre.localeCompare(b.nombre));
        else if (currentSort === 'ZA') temp.sort((a, b) => b.nombre.localeCompare(a.nombre));
        else if (currentSort === 'RANDOM') temp.sort(() => Math.random() - 0.5);

        filteredThemes = temp;
        currentPage = 1;
        render();
    }

    searchInput.addEventListener('input', (e) => {
        searchText = e.target.value.toLowerCase().trim();
        applyFilters();
    });

    catSelect.addEventListener('change', (e) => {
        currentCategory = e.target.value;
        applyFilters();
    });

    sortSelect.addEventListener('change', (e) => {
        currentSort = e.target.value;
        applyFilters();
    });

    randomBtn.addEventListener('click', () => {
        const icon = randomBtn.querySelector('.dado-icon');
        icon.classList.add('spinning');
        setTimeout(() => icon.classList.remove('spinning'), 500);
        currentSort = 'RANDOM';
        sortSelect.value = 'RANDOM';
        applyFilters();
    });

    async function init() {
        try {
            const response = await fetch('./temas.json');
            allThemes = await response.json();
            allThemes.sort((a, b) => a.nombre.localeCompare(b.nombre));
            filteredThemes = [...allThemes];
            render();
        } catch (err) { console.error("Error", err); }
    }

    function render() {
        gallery.innerHTML = '';
        if (filteredThemes.length === 0) {
            noResults.style.display = 'block';
            paginationContainer.innerHTML = '';
            return;
        } else {
            noResults.style.display = 'none';
        }

        const totalPages = Math.ceil(filteredThemes.length / itemsPerPage);
        const start = (currentPage - 1) * itemsPerPage;
        const items = filteredThemes.slice(start, start + itemsPerPage);

        items.forEach(tema => {
            const card = document.createElement('div');
            card.className = 'card';
            const imgFileName = fixPath(tema.nombre) + ".webp";
            const thumbUrl = `./Images/640/${imgFileName}`;
            const fullUrl = `./Images/${imgFileName}`;
            
            card.innerHTML = `
                <div class="img-wrapper">
                    <img src="${thumbUrl}" alt="${tema.nombre}" loading="lazy" onerror="this.src='https://placehold.co/600x337/161b22/8b949e?text=No+Image'">
                    <div style="position:absolute; bottom:8px; right:8px;"><span class="tag">[${isDynamic(tema) ? 'Dinámico' : 'Estático'}]</span></div>
                </div>
                <h3 class="card-title" title="${tema.nombre}">${tema.nombre}</h3>
                <div class="btn-group">
                    <button class="btn btn-preview" onclick="showPreview('${fullUrl.replace(/'/g, "\\'")}')">Vista previa</button>
                    <a href="${tema.descarga}" target="_blank" class="btn btn-download">Descargar</a>
                </div>
            `;
            gallery.appendChild(card);
        });
        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        paginationContainer.innerHTML = '';
        if (totalPages <= 1) return;
        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement('button');
            btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
            btn.textContent = i;
            btn.onclick = () => { currentPage = i; render(); window.scrollTo({top: 0, behavior: 'smooth'}); };
            paginationContainer.appendChild(btn);
        }
    }

    function showPreview(url) { modalImg.src = url; modal.classList.add('show'); }
    function closePreview() { modal.classList.remove('show'); }
    
    document.addEventListener('DOMContentLoaded', () => {
        const logo = document.querySelector('.main-logo');
        if (logo) logo.addEventListener('click', () => {
            searchInput.value = ''; searchText = '';
            catSelect.value = 'ALL'; currentCategory = 'ALL';
            sortSelect.value = 'AZ'; currentSort = 'AZ';
            applyFilters();
        });
    });

    init();
</script>
</body>
</html>
