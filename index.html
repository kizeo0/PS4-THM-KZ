<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS4 THM KZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-top: #1a2942; 
            --bg-bottom: #0b111c;
            --text-main: #f0f6fc;
            --text-muted: #8b9db5; 
            --blue-light: #58a6ff;
            --blue-dark: #0056b3;
            --border-color: rgba(255,255,255,0.05);
            --bg-card: rgba(20, 26, 41, 0.7);
            --glow-preview: rgba(88, 166, 255, 0.5);
            --glow-download: rgba(0, 86, 179, 0.6);
        }

        * { box-sizing: border-box; }

        body {
            background: radial-gradient(ellipse at top center, var(--bg-top) 0%, var(--bg-bottom) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px 10px 20px;
            position: relative;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            position: relative;
        }

        .main-logo { 
            width: 100%; 
            max-width: 450px; 
            display: block;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); 
            cursor: pointer;
        }

        .subtitle {
            margin-top: -12px;
            margin-right: 18px;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        
        .by-text {
            color: #7a8c9e;
            font-weight: 400;
        }

        .kizeo-text {
            color: #4a88c7;
            font-weight: 500;
        }

        .social-container {
            position: absolute;
            right: 40px;
            top: 40px;
            display: flex;
            gap: 15px;
        }

        .social-icon {
            width: 32px;
            height: 32px;
            transition: transform 0.3s ease;
        }
        .social-icon:hover {
            transform: scale(1.1);
        }

        .toolbar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 30px auto 40px auto;
            width: 100%;
            padding: 0 20px;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            z-index: 10;
        }

        .search-box {
            width: 100%;
            padding: 14px 45px 14px 25px;
            border-radius: 30px;
            background-color: #172236;
            border: 1px solid transparent;
            border-top: 1px solid rgba(255, 255, 255, 0.25);
            border-bottom: 1px solid rgba(0, 0, 0, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(0, 0, 0, 0.4);
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.25);
            color: #d1d9e6;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            background-color: #1a2840;
            border-top: 1px solid rgba(88, 166, 255, 0.5);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3), 0 0 15px rgba(88, 166, 255, 0.15); 
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px; height: 22px;
            fill: none;
            stroke: #8b9db5;
            stroke-width: 2.5;
            pointer-events: none;
        }

        .filters-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            z-index: 5;
            flex-wrap: wrap;
        }

        .custom-select {
            background: rgba(20, 29, 46, 0.6);
            color: #8b9db5;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            font-family: inherit;
            font-size: 14px;
        }

        .random-button {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .dado-icon {
            width: 32px;
            height: 32px;
        }

        @keyframes dice-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinning {
            animation: dice-spin 0.5s ease-out;
        }

        main {
            padding: 0 40px 40px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .card:hover { 
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), inset 0 0 0 1px var(--blue-light); 
            transform: translateY(-5px); 
        }

        .img-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .tags {
            position: absolute;
            bottom: 8px;
            right: 8px;
            display: flex;
            gap: 5px;
        }

        .tag {
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-title {
            margin: 15px 0;
            font-size: 15px;
            font-weight: 400;
            color: var(--text-main);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        /* --- BOTONES CON EFECTOS DE LUZ --- */
        .btn {
            flex: 1;
            padding: 10px 0;
            border-radius: 20px;
            border: none;
            font-family: inherit;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            position: relative;
            overflow: hidden; /* Necesario para el efecto de brillo */
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* Efecto de destello (shine) al pasar el cursor */
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: all 0.6s;
            z-index: -1;
        }

        .btn:hover::before {
            left: 100%;
        }

        /* Feedback al presionar */
        .btn:active {
            transform: scale(0.95);
        }

        .btn-preview {
            background: rgba(88, 166, 255, 0.1);
            color: var(--blue-light);
            border: 1px solid rgba(88, 166, 255, 0.3);
        }

        .btn-preview:hover {
            background: rgba(88, 166, 255, 0.25);
            color: white;
            border-color: var(--blue-light);
            box-shadow: 0 0 15px var(--glow-preview);
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .btn-download {
            background: var(--blue-dark);
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-download:hover {
            background: #0066d6;
            box-shadow: 0 0 20px var(--glow-download);
            transform: translateY(-2px);
        }

        /* ---------------------------------- */

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 40px 0 60px 0;
        }

        .page-btn {
            background: rgba(20, 26, 41, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-family: inherit;
            font-weight: 500;
        }

        .page-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .page-btn.active {
            background: var(--blue-light);
            color: white;
            border-color: var(--blue-light);
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #preview-modal {
            visibility: hidden;
            opacity: 0;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }

        #preview-modal.show {
            visibility: visible;
            opacity: 1;
        }

        #preview-modal img {
            max-width: 90%;
            max-height: 85%;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 45px;
            font-weight: 300;
            cursor: pointer;
            line-height: 1;
        }

        footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            padding-bottom: 30px;
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            header { padding: 20px 15px; }
            .social-container { position: static; margin-top: 20px; justify-content: center; }
            main { padding: 0 20px 20px 20px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
            .main-logo { max-width: 320px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/kizeo0/PS4-THM-KZ/refs/heads/main/recursos/titulo.png" alt="PS4 Themes" class="main-logo">
        <div class="subtitle">
            <span class="by-text">by</span> <span class="kizeo-text">KiZeo</span>
        </div>
    </div>
   <div class="social-container">
        <a href="https://www.youtube.com/@kizeo0/videos" target="_blank"><img src="recursos/yt.png" alt="YT" class="social-icon"></a>
        <a href="https://github.com/kizeo0" target="_blank"><img src="recursos/git.png" alt="Git" class="social-icon"></a>
        <a href="https://x.com/KiZeo0" target="_blank"><img src="recursos/x.png" alt="X" class="social-icon"></a>
    </div>
</header>

<div class="toolbar">
    <div class="search-wrapper">
        <input type="text" id="search" class="search-box" placeholder="Buscar temas...">
    </div>
    <div class="filters-container">
        <select class="custom-select" id="sort-select">
            <option value="AZ">A-Z</option>
            <option value="ZA">Z-A</option>
            <option value="RANDOM">Aleatorio</option>
        </select>
        <select class="custom-select" id="cat-select">
            <option value="ALL">Todas las Categorías</option>
            <option value="DYN">Dinámicos</option>
            <option value="STA">Estáticos</option>
        </select>
        <button id="random-btn" class="random-button">
            <img src="recursos/dado.png" alt="Aleatorio" class="dado-icon">
        </button>
    </div>
</div>

<main id="gallery"></main>

<div id="no-results" style="display:none; text-align:center; padding: 50px;">
    <h2 style="color: var(--text-muted); font-weight: 400;">No se encontraron temas</h2>
</div>

<div class="pagination" id="pagination"></div>

<footer>
    &copy; 2026 PS4 Themes Library. Todos los derechos reservados.
</footer>

<div id="preview-modal">
    <span class="close-modal" onclick="closePreview()">&times;</span>
    <img id="modal-img" src="" alt="Vista Previa Full">
</div>

<script>
    let allThemes = [];
    let filteredThemes = [];
    let currentPage = 1;
    const itemsPerPage = 12;
    let searchText = '';
    let currentCategory = 'ALL';
    let currentSort = 'AZ';

    const gallery = document.getElementById('gallery');
    const searchInput = document.getElementById('search');
    const sortSelect = document.getElementById('sort-select');
    const catSelect = document.getElementById('cat-select');
    const randomBtn = document.getElementById('random-btn');
    const paginationContainer = document.getElementById('pagination');
    const modal = document.getElementById('preview-modal');
    const modalImg = document.getElementById('modal-img');
    const noResults = document.getElementById('no-results');

    function fixPath(name) {
        return encodeURIComponent(name)
            .replace(/'/g, "%27")
            .replace(/\(/g, "%28")
            .replace(/\)/g, "%29");
    }

    function isDynamic(theme) {
        return theme.nombre.toLowerCase().includes('dynamic');
    }

    function applyFilters() {
        let temp = allThemes.filter(theme => {
            const matchesCat = (currentCategory === 'ALL') || 
                               (currentCategory === 'DYN' && isDynamic(theme)) || 
                               (currentCategory === 'STA' && !isDynamic(theme));
            const matchesSearch = theme.nombre.toLowerCase().includes(searchText);
            return matchesCat && matchesSearch;
        });

        if (currentSort === 'AZ') temp.sort((a, b) => a.nombre.localeCompare(b.nombre));
        else if (currentSort === 'ZA') temp.sort((a, b) => b.nombre.localeCompare(a.nombre));
        else if (currentSort === 'RANDOM') temp.sort(() => Math.random() - 0.5);

        filteredThemes = temp;
        currentPage = 1;
        render();
    }

    searchInput.addEventListener('input', (e) => {
        searchText = e.target.value.toLowerCase().trim();
        applyFilters();
    });

    catSelect.addEventListener('change', (e) => {
        currentCategory = e.target.value;
        applyFilters();
    });

    sortSelect.addEventListener('change', (e) => {
        currentSort = e.target.value;
        applyFilters();
    });

    randomBtn.addEventListener('click', () => {
        const icon = randomBtn.querySelector('.dado-icon');
        icon.classList.add('spinning');
        setTimeout(() => icon.classList.remove('spinning'), 500);
        
        currentSort = 'RANDOM';
        sortSelect.value = 'RANDOM';
        applyFilters();
    });

    async function init() {
        try {
            const response = await fetch('./temas.json');
            allThemes = await response.json();
            allThemes.sort((a, b) => a.nombre.localeCompare(b.nombre));
            filteredThemes = [...allThemes];
            render();
        } catch (err) {
            console.error("Error cargando temas:", err);
            gallery.innerHTML = '<p>Error al cargar la galería.</p>';
        }
    }

    function render() {
        gallery.innerHTML = '';
        if (filteredThemes.length === 0) {
            noResults.style.display = 'block';
            paginationContainer.innerHTML = '';
            return;
        } else {
            noResults.style.display = 'none';
        }

        const totalPages = Math.ceil(filteredThemes.length / itemsPerPage);
        if (currentPage > totalPages) currentPage = totalPages;
        
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const items = filteredThemes.slice(start, end);

        items.forEach(tema => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const imgFileName = fixPath(tema.nombre) + ".webp";
            const thumbUrl = `./Images/640/${imgFileName}`;
            const fullUrl = `./Images/${imgFileName}`;
            
            const dynamic = isDynamic(tema);
            const tagText = dynamic ? 'Dinámico' : 'Estático';

            card.innerHTML = `
                <div class="img-wrapper">
                    <img src="${thumbUrl}" alt="${tema.nombre}" loading="lazy" onerror="this.src='https://placehold.co/600x337/161b22/8b949e?text=No+Image'">
                    <div class="tags">
                        <span class="tag">[${tagText}]</span>
                        <span class="tag">[PS4]</span>
                    </div>
                </div>
                <h3 class="card-title" title="${tema.nombre}">${tema.nombre}</h3>
                <div class="btn-group">
                    <button class="btn btn-preview" onclick="showPreview('${fullUrl.replace(/'/g, "\\'")}')">Vista previa</button>
                    <button class="btn btn-download" onclick="window.open('${tema.descarga.replace(/'/g, "\\'")}', '_blank')">Descargar</button>
                </div>
            `;
            gallery.appendChild(card);
        });

        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        paginationContainer.innerHTML = '';
        if (totalPages <= 1) return;

        const prevBtn = document.createElement('button');
        prevBtn.className = 'page-btn';
        prevBtn.innerHTML = '&lt;';
        prevBtn.disabled = currentPage === 1;
        prevBtn.onclick = () => { currentPage--; render(); window.scrollTo({top: 0, behavior: 'smooth'}); };
        paginationContainer.appendChild(prevBtn);

        const maxVisible = 5;
        let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
        let endPage = Math.min(totalPages, startPage + maxVisible - 1);
        
        if (endPage - startPage + 1 < maxVisible) {
            startPage = Math.max(1, endPage - maxVisible + 1);
        }

        for (let i = startPage; i <= endPage; i++) {
            const btn = document.createElement('button');
            btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
            btn.textContent = i;
            btn.onclick = () => { currentPage = i; render(); window.scrollTo({top: 0, behavior: 'smooth'}); };
            paginationContainer.appendChild(btn);
        }

        const nextBtn = document.createElement('button');
        nextBtn.className = 'page-btn';
        nextBtn.innerHTML = '&gt;';
        nextBtn.disabled = currentPage === totalPages;
        nextBtn.onclick = () => { currentPage++; render(); window.scrollTo({top: 0, behavior: 'smooth'}); };
        paginationContainer.appendChild(nextBtn);
    }

    function showPreview(url) { modalImg.src = url; modal.classList.add('show'); }
    function closePreview() { modal.classList.remove('show'); setTimeout(() => { modalImg.src = ''; }, 300); }
    modal.addEventListener('click', (e) => { if (e.target === modal) closePreview(); });

    init();

    function resetToMain() {
        if (!allThemes.length) return;
        searchText = '';
        searchInput.value = '';
        currentCategory = 'ALL';
        catSelect.value = 'ALL';
        currentSort = 'AZ';
        sortSelect.value = 'AZ';
        filteredThemes = [...allThemes].sort((a, b) => a.nombre.localeCompare(b.nombre));
        currentPage = 1;
        render();
    }

    document.addEventListener('DOMContentLoaded', () => {
        const logo = document.querySelector('.main-logo');
        if (logo) {
            logo.addEventListener('click', resetToMain);
        }
    });
</script>

</body>
</html>
