<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS4 Themes Library - KiZeo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-top: #1a2942; 
            --bg-bottom: #0b111c;
            --text-main: #f0f6fc;
            --text-muted: #8b9db5; 
            --blue-light: #58a6ff;
            --blue-dark: #0056b3;
            --border-color: rgba(255,255,255,0.05);
            --bg-card: rgba(20, 26, 41, 0.7);
        }

        * { box-sizing: border-box; }

        body {
            background: radial-gradient(ellipse at top center, var(--bg-top) 0%, var(--bg-bottom) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px 10px 20px;
            position: relative;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            position: relative;
        }

        .main-logo { 
            width: 100%; 
            max-width: 450px; 
            display: block;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); 
            cursor: pointer; /* Indica que es clickeable */
        }

        .subtitle {
            margin-top: -12px;
            margin-right: 18px;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        
        .by-text {
            color: #7a8c9e;
            font-weight: 400;
        }

        .kizeo-text {
            color: #4a88c7;
            font-weight: 500;
        }

        .social-container {
            position: absolute;
            right: 40px;
            top: 40px;
            display: flex;
            gap: 15px;
        }

        .social-icon {
            width: 32px;
            height: 32px;
            transition: transform 0.3s ease;
        }
        .social-icon:hover {
            transform: scale(1.1);
        }

        .toolbar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 30px auto 40px auto;
            width: 100%;
            padding: 0 20px;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            z-index: 10;
        }

        .search-box {
            width: 100%;
            padding: 14px 45px 14px 25px;
            border-radius: 30px;
            background-color: #172236;
            border: 1px solid transparent;
            border-top: 1px solid rgba(255, 255, 255, 0.25);
            border-bottom: 1px solid rgba(0, 0, 0, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(0, 0, 0, 0.4);
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.25);
            color: #d1d9e6;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box::placeholder {
            color: #6d7b93;
            font-weight: 400;
        }

        .search-box:focus {
            background-color: #1a2840;
            border-top: 1px solid rgba(88, 166, 255, 0.5);
            border-bottom: 1px solid rgba(0, 0, 0, 0.8);
            box-shadow: 
                0 6px 12px rgba(0, 0, 0, 0.3), 
                0 0 15px rgba(88, 166, 255, 0.15); 
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px; height: 22px;
            fill: none;
            stroke: #8b9db5;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }

        .filters-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            z-index: 5;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .custom-select {
            background: rgba(20, 29, 46, 0.6);
            color: #8b9db5;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        .custom-select:hover {
            background: rgba(30, 42, 65, 0.8);
            color: white;
            border-color: rgba(255,255,255,0.2);
        }
        .custom-select option {
            background: var(--bg-top);
            color: white;
        }

        /* Botón del dado */
        .random-button {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }
        .random-button:hover {
            transform: scale(1.1);
        }
        .dado-icon {
            width: 32px;
            height: 32px;
            display: block;
        }

        /* Animación de giro para el dado */
        @keyframes dice-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinning {
            animation: dice-spin 0.5s ease-out;
        }

        main {
            padding: 0 40px 40px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .card:hover { 
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), inset 0 0 0 1px var(--blue-light); 
            transform: translateY(-5px); 
        }

        .img-wrapper {
            position: relative; width: 100%; aspect-ratio: 16/9;
            border-radius: 10px; overflow: hidden; background: #000;
            border: 1px solid rgba(0,0,0,0.5);
        }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        .card:hover .img-wrapper img { opacity: 0.8; transform: scale(1.03); }

        .tags { position: absolute; bottom: 8px; right: 8px; display: flex; gap: 5px; }
        .tag { background: rgba(0,0,0,0.75); padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; border: 1px solid rgba(255,255,255,0.1); }

        .card-title {
            margin: 15px 0; font-size: 15px; font-weight: 400; text-align: center;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .btn-group { display: flex; gap: 10px; }
        .btn {
            flex: 1; padding: 10px 0; border-radius: 20px; border: none;
            font-family: inherit; font-weight: 500; font-size: 13px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn-preview { background: rgba(88, 166, 255, 0.15); color: var(--blue-light); border: 1px solid rgba(88, 166, 255, 0.3); }
        .btn-preview:hover { background: var(--blue-light); color: white; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(88,166,255,0.3); }
        .btn-download { background: var(--blue-dark); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn-download:hover { background: #0066d6; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,102,214,0.4); }

        .pagination { display: flex; justify-content: center; gap: 8px; margin: 20px 0 40px 0; }
        .page-btn {
            background: rgba(20, 26, 41, 0.8); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted);
            width: 38px; height: 38px; border-radius: 8px; cursor: pointer; transition: 0.2s;
            display: flex; justify-content: center; align-items: center; font-family: inherit; font-weight: 500;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .page-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); color: white; transform: translateY(-2px); }
        .page-btn.active { background: var(--blue-light); color: white; border-color: var(--blue-light); box-shadow: 0 4px 10px rgba(88,166,255,0.3); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

        #preview-modal {
            visibility: hidden; opacity: 0; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 1000; display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        #preview-modal.show { visibility: visible; opacity: 1; }
        #preview-modal img { max-width: 90%; max-height: 85%; border-radius: 8px; border: 2px solid var(--blue-light); box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        footer { text-align: center; color: var(--text-muted); font-size: 12px; padding: 20px 0; margin-top: 30px; }
        #no-results { text-align: center; padding: 50px; display: none; }

        @media (max-width: 900px) {
            .social-container { position: static; margin-bottom: 20px; }
            header { padding-top: 20px; }
            .subtitle { margin-right: 0; align-self: center; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/kizeo0/PS4-THM-KZ/refs/heads/main/recursos/titulo.png" alt="PS4 Themes" class="main-logo">
        <div class="subtitle">
            <span class="by-text">by</span> <span class="kizeo-text">KiZeo</span>
        </div>
    </div>

   <div class="social-container">
        <a href="https://www.youtube.com/@kizeo0/videos" target="_blank"><img src="recursos/yt.png" alt="YT" class="social-icon"></a>
        <a href="https://github.com/kizeo0" target="_blank"><img src="recursos/git.png" alt="Git" class="social-icon"></a>
        <a href="https://x.com/KiZeo0" target="_blank"><img src="recursos/x.png" alt="X" class="social-icon"></a>
    </div>
</header>

<div class="toolbar">
    <div class="search-wrapper">
        <input type="text" id="search" class="search-box" placeholder="Buscar temas...">
        <svg class="search-icon" viewBox="0 0 24 24">
            <circle cx="10.5" cy="10.5" r="7.5"></circle>
            <line x1="21" y1="21" x2="15.8" y2="15.8"></line>
        </svg>
    </div>

    <div class="filters-container">
        <div class="filter-group">
            <select class="custom-select" id="sort-select">
                <option value="AZ">A-Z</option>
                <option value="ZA">Z-A</option>
                <option value="RANDOM">Aleatorio</option>
            </select>
        </div>
        <div class="filter-group">
            <select class="custom-select" id="cat-select">
                <option value="ALL">Todas las Categorías</option>
                <option value="DYN">Dinámicos</option>
                <option value="STA">Estáticos</option>
            </select>
        </div>
        <button id="random-btn" class="random-button" title="Temas aleatorios">
            <img src="recursos/dado.png" alt="Aleatorio" class="dado-icon">
        </button>
    </div>
</div>

<main id="gallery"></main>
<div id="no-results"><h2>No se encontraron temas</h2></div>
<div class="pagination" id="pagination"></div>

<footer>Creado por KiZeo - Para la Comunidad</footer>

<div id="preview-modal">
    <span class="close-modal" onclick="closePreview()">&times;</span>
    <img id="modal-img" src="" alt="Vista Previa">
</div>

<script>
    let allThemes = [];
    let filteredThemes = [];
    let currentPage = 1;
    const itemsPerPage = 12;

    // Estados de filtros
    let searchText = '';
    let currentCategory = 'ALL'; // 'ALL', 'DYN', 'STA'
    let currentSort = 'AZ';      // 'AZ', 'ZA', 'RANDOM'

    const gallery = document.getElementById('gallery');
    const searchInput = document.getElementById('search');
    const sortSelect = document.getElementById('sort-select');
    const catSelect = document.getElementById('cat-select');
    const randomBtn = document.getElementById('random-btn');
    const paginationContainer = document.getElementById('pagination');
    const modal = document.getElementById('preview-modal');
    const modalImg = document.getElementById('modal-img');
    const noResults = document.getElementById('no-results');

    function fixPath(name) {
        return encodeURIComponent(name).replace(/'/g, "%27").replace(/\(/g, "%28").replace(/\)/g, "%29");
    }

    // Función que determina si un tema es dinámico (por nombre)
    function isDynamic(theme) {
        return theme.nombre.toLowerCase().includes('dynamic');
    }

    // Aplica filtros de búsqueda y categoría, luego ordena según currentSort
    function applyFilters() {
        // Primero filtrar por categoría
        let temp = allThemes.filter(theme => {
            if (currentCategory === 'ALL') return true;
            if (currentCategory === 'DYN') return isDynamic(theme);
            if (currentCategory === 'STA') return !isDynamic(theme);
            return true;
        });

        // Luego filtrar por búsqueda
        if (searchText) {
            temp = temp.filter(t => t.nombre.toLowerCase().includes(searchText));
        }

        // Ordenar según currentSort
        if (currentSort === 'AZ') {
            temp.sort((a, b) => a.nombre.localeCompare(b.nombre));
        } else if (currentSort === 'ZA') {
            temp.sort((a, b) => b.nombre.localeCompare(a.nombre));
        } else if (currentSort === 'RANDOM') {
            temp.sort(() => Math.random() - 0.5);
        }

        filteredThemes = temp;
        currentPage = 1; // Volver a primera página al filtrar
        render();
    }

    // Evento de búsqueda
    let searchTimeout;
    searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            searchText = e.target.value.toLowerCase().trim();
            applyFilters();
        }, 300);
    });

    // Evento de cambio de categoría
    catSelect.addEventListener('change', (e) => {
        currentCategory = e.target.value;
        applyFilters();
    });

    // Evento de cambio de orden
    sortSelect.addEventListener('change', (e) => {
        currentSort = e.target.value;
        // Reordenar el array filtrado actual según el nuevo criterio
        if (currentSort === 'AZ') {
            filteredThemes.sort((a, b) => a.nombre.localeCompare(b.nombre));
        } else if (currentSort === 'ZA') {
            filteredThemes.sort((a, b) => b.nombre.localeCompare(a.nombre));
        } else if (currentSort === 'RANDOM') {
            filteredThemes.sort(() => Math.random() - 0.5);
        }
        render(); // Solo renderizar, no cambiar página
    });

    // Evento del botón de dado (aleatorizar)
    randomBtn.addEventListener('click', () => {
        // Añadir animación de giro
        const icon = randomBtn.querySelector('.dado-icon');
        icon.classList.add('spinning');
        
        // Quitar la clase después de que termine la animación (0.5s) para poder repetirla
        setTimeout(() => {
            icon.classList.remove('spinning');
        }, 500);

        // Aplicar orden aleatorio a los temas filtrados actualmente
        filteredThemes.sort(() => Math.random() - 0.5);
        currentSort = 'RANDOM';
        sortSelect.value = 'RANDOM'; // Sincronizar el select
        render();
    });

    async function init() {
        try {
            const response = await fetch('./temas.json');
            allThemes = await response.json();
            // Orden inicial A-Z
            allThemes.sort((a, b) => a.nombre.localeCompare(b.nombre));
            filteredThemes = [...allThemes];
            render();
        } catch (err) { console.error("Error", err); }
    }

    function render() {
        gallery.innerHTML = '';
        if (filteredThemes.length === 0) {
            noResults.style.display = 'block';
            paginationContainer.innerHTML = '';
            return;
        } else {
            noResults.style.display = 'none';
        }

        const totalPages = Math.ceil(filteredThemes.length / itemsPerPage);
        if (currentPage > totalPages) currentPage = totalPages;
        
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const items = filteredThemes.slice(start, end);

        items.forEach(tema => {
            const card = document.createElement('div');
            card.className = 'card';
            // CAMBIO: extensión cambiada a .webp
            const imgFileName = fixPath(tema.nombre) + ".webp";
            const thumbUrl = `./Images/640/${imgFileName}`;
            const fullUrl = `./Images/${imgFileName}`;
            
            // Determinar etiqueta según el nombre
            const dynamic = isDynamic(tema);
            const tagText = dynamic ? 'Dinámico' : 'Estático';

            card.innerHTML = `
                <div class="img-wrapper">
                    <img src="${thumbUrl}" alt="${tema.nombre}" loading="lazy" onerror="this.src='https://placehold.co/600x337/161b22/8b949e?text=No+Image'">
                    <div class="tags"><span class="tag">[${tagText}]</span><span class="tag">[PS4]</span></div>
                </div>
                <h3 class="card-title" title="${tema.nombre}">${tema.nombre}</h3>
                <div class="btn-group">
                    <button class="btn btn-preview" onclick="showPreview('${fullUrl}')">Vista previa</button>
                    <button class="btn btn-download" onclick="window.open('${tema.descarga}', '_blank')">Descargar</button>
                </div>
            `;
            gallery.appendChild(card);
        });
        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        paginationContainer.innerHTML = '';
        if (totalPages <= 1) return;

        const prevBtn = document.createElement('button');
        prevBtn.className = 'page-btn';
        prevBtn.innerHTML = '&lt;';
        prevBtn.disabled = currentPage === 1;
        prevBtn.onclick = () => { currentPage--; render(); window.scrollTo({top: 0, behavior: 'smooth'}); };
        paginationContainer.appendChild(prevBtn);

        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, startPage + 4);
        if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

        for (let i = startPage; i <= endPage; i++) {
            const btn = document.createElement('button');
            btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
            btn.textContent = i;
            btn.onclick = () => { currentPage = i; render(); window.scrollTo({top: 0, behavior: 'smooth'}); };
            paginationContainer.appendChild(btn);
        }

        const nextBtn = document.createElement('button');
        nextBtn.className = 'page-btn';
        nextBtn.innerHTML = '&gt;';
        nextBtn.disabled = currentPage === totalPages;
        nextBtn.onclick = () => { currentPage++; render(); window.scrollTo({top: 0, behavior: 'smooth'}); };
        paginationContainer.appendChild(nextBtn);
    }

    function showPreview(url) { modalImg.src = url; modal.classList.add('show'); }
    function closePreview() { modal.classList.remove('show'); setTimeout(() => { modalImg.src = ''; }, 300); }
    modal.addEventListener('click', (e) => { if (e.target === modal) closePreview(); });

    init();

    // --- NUEVA FUNCIONALIDAD: clic en el banner para volver al inicio ---
    function resetToMain() {
        if (!allThemes.length) return; // No hacer nada si aún no hay datos

        // Restaurar valores por defecto
        searchText = '';
        searchInput.value = '';
        currentCategory = 'ALL';
        catSelect.value = 'ALL';
        currentSort = 'AZ';
        sortSelect.value = 'AZ';

        // Restaurar lista completa ordenada A-Z (copia del array original)
        filteredThemes = [...allThemes].sort((a, b) => a.nombre.localeCompare(b.nombre));
        currentPage = 1;
        render();
    }

    // Asignar el evento al logo (banner) una vez que el DOM esté listo
    document.addEventListener('DOMContentLoaded', () => {
        const logo = document.querySelector('.main-logo');
        if (logo) {
            logo.addEventListener('click', resetToMain);
        }
    });
</script>
</body>
</html>
